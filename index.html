<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>market-pulse</title>
    <meta name="description" content="Ein elegantes Echtzeit-Dashboard für die weltweit größten Aktien.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="dashboard-container">
        
        <header>
            <h1>Market-Pulse</h1>
            <p id="live-indicator">● Live-Marktdaten der globalen Tech-Giganten im Überblick.</p>
        </header>

        <div class="market-grid">
            
            <div class="asset-card green-trend">
                
                <div class="card-header">
                    <span class="asset-name">Apple Inc.</span>
                    <span class="asset-ticker">AAPL</span>
                </div>

                <div class="asset-price">$180.25</div>
                
                <div class="asset-change">+1.45%</div>

            </div> 
        </div> 
    </div> 
</body>

</html>
