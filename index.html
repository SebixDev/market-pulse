<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>market-pulse</title>
    <meta name="description" content="Ein elegantes Echtzeit-Dashboard für die weltweit größten Aktien.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="dashboard-container">
        
        <header>
            <h1>Market-Pulse</h1>
            <p id="live-indicator">● Globale Live-Marktdaten mit flexibler Zeitraum-Auswahl.</p>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Aktien- oder ETF-Namen eingeben (z.B. Microsoft, S&P 500)...">
                <button id="search-button">Suchen</button>
            </div>
        </header>

        <div class="market-grid" id="market-grid">
            <div class="asset-card" id="card-AAPL">
                <div class="card-header">
                    <span class="asset-name" id="name-AAPL">Apple Inc.</span>
                    <span class="asset-ticker">AAPL</span>
                </div>
                <div class="timeframe-selector">
                    <button class="tf-btn active" onclick="changeTimeframe('AAPL', '1d', this)">1D</button>
                    <button class="tf-btn" onclick="changeTimeframe('AAPL', '5d', this)">1W</button>
                    <button class="tf-btn" onclick="changeTimeframe('AAPL', '1m', this)">1M</button>
                    <button class="tf-btn" onclick="changeTimeframe('AAPL', '1y', this)">1J</button>
                </div>
                <div class="asset-price" id="price-AAPL">Lade...</div>
                <div class="asset-change" id="change-AAPL">--%</div>
                <div class="chart-container">
                    <canvas id="chart-AAPL" width="280" height="80"></canvas>
                </div>
            </div>
        </div> 
    </div> 

    <script src="script.js"></script>
</body>
</html>
