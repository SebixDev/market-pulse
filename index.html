<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>market-pulse</title>
    <meta name="description" content="Ein elegantes Echtzeit-Dashboard für die weltweit größten Aktien mit dynamischer Markt-Aura.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="starfield"></canvas>
    <div id="aura-glow"></div>

    <div id="dashboard-container">
        
        <header>
            <h1>Market-Pulse</h1>
            <p id="live-indicator"><span id="pulse-dot">●</span> Globale Live-Marktdaten mit flexibler Zeitraum-Auswahl.</p>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Namen eingeben...">
                <button id="search-button">Suchen</button>
            </div>
        </header>

        <div class="market-grid" id="market-grid">
        </div> 
    </div> 

    <script src="script.js"></script>
</body>
</html>
