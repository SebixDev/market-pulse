<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>market-pulse</title>
    <meta name="description" content="Ein elegantes Echtzeit-Dashboard für die weltweit größten Aktien mit dynamischer Markt-Aura.">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <canvas id="starfield" aria-hidden="true"></canvas>
    <div id="aura-glow" aria-hidden="true"></div>

    <div id="dashboard-container">

        <header>
            <h1>Market-Pulse</h1>
            <p id="live-indicator"><span id="pulse-dot" aria-hidden="true">●</span> Globale Live-Marktdaten mit flexibler Zeitraum-Auswahl.</p>

            <div class="search-container">
                <label for="search-input" class="visually-hidden">Aktie oder Ticker suchen</label>
                <input type="text" id="search-input" placeholder="Namen eingeben..." autocomplete="off">
                <button id="search-button">Suchen</button>
            </div>
        </header>

        <div class="market-grid" id="market-grid"></div>
    </div>

</body>
</html>
